# Rotozoom status page — powered by Upptime (runs on GitHub Actions, independent
# of our own Cloudflare/Supabase infra so it stays up when they don't).
owner: avs-dev-ledlightings
repo: rotozoom-status

sites:
  - name: Website
    url: https://rotozoom.com
  - name: Status API
    url: https://rotozoom.com/api/status
  - name: Licensing
    url: https://ttcrdwftrkdwcngqswrd.supabase.co/functions/v1/avs-connect-login
    method: POST
    body: "{}"
    headers:
      - "Content-Type: application/json"
    expectedStatusCodes:
      - 401
  - name: Supabase
    url: https://ttcrdwftrkdwcngqswrd.supabase.co/rest/v1/
    expectedStatusCodes:
      - 401
  - name: AI — Claude (Anthropic)
    url: https://api.anthropic.com/v1/models
    expectedStatusCodes:
      - 401
  - name: Embeddings — Voyage
    url: https://api.voyageai.com/v1/embeddings
    method: POST
    body: "{}"
    headers:
      - "Content-Type: application/json"
    expectedStatusCodes:
      - 400
      - 401
  - name: Payments — Stripe
    url: https://api.stripe.com/v1/balance
    expectedStatusCodes:
      - 401
  - name: Google Sign-in
    url: https://accounts.google.com/.well-known/openid-configuration

status-website:
  cname: status.rotozoom.com
  name: Rotozoom Status
  introTitle: "Rotozoom — Service Status"
  introMessage: "Live status and uptime history of Rotozoom and the services it depends on."
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://rotozoom.com
